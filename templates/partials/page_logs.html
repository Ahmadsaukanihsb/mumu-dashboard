                <!-- Logs Page (Activity + Account Logs) -->
                <div class="page" id="page-logs">
                    <!-- Activity Section -->
                    <div class="card" style="margin-bottom:16px">
                        <div class="card-header">
                            <h3><i class="fas fa-history"></i> Activity Log</h3>
                            <button class="btn btn-sm btn-danger" onclick="clearActivity()"><i class="fas fa-trash"></i> Clear</button>
                        </div>
                        <div class="card-body" style="max-height:250px;overflow-y:auto">
                            <div class="activity-timeline" id="activityLog">
                                <div class="empty-state"><i class="fas fa-history"></i> Belum ada aktivitas</div>
                            </div>
                        </div>
                    </div>

                    <!-- Account Logs Section -->
                    <div class="card">
                        <div class="card-header">
                            <h3><i class="fas fa-clipboard-list"></i> Account Logs</h3>
                            <div style="display:flex;gap:8px;align-items:center">
                                <select class="input" id="logAccountSelect" onchange="loadAccountLogs(this.value)" style="max-width:200px;font-size:12px">
                                    <option value="">— Pilih Account —</option>
                                </select>
                                <button class="btn btn-sm btn-secondary" onclick="clearAccountLogs()"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="card-body" id="accountLogsContainer">
                            <div class="empty-state"><i class="fas fa-search"></i> Pilih account untuk melihat log</div>
                        </div>
                    </div>
                </div>
