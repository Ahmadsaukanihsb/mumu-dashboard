<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Command Center — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/static/style.css?v=19">
<style>
:root{--bg-primary:#07080f;--bg-card:#0f1320;--bg-input:#12182a;--border-color:#1e2640;--text-primary:#eef1f8;--text-secondary:#8892b0;--accent-1:#ff3b4a;--accent-gradient:linear-gradient(135deg,#ff3b4a,#dc2f3b);--green:#22c55e;--red:#ef4444;--blurple:#5865f2;--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{margin:0;font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(800px circle at 30% 20%,rgba(255,59,74,0.05) 0%,transparent 60%),radial-gradient(600px circle at 70% 80%,rgba(0,180,216,0.04) 0%,transparent 60%);pointer-events:none}
.orb{position:fixed;width:400px;height:400px;border-radius:50%;filter:blur(100px);opacity:0.08;pointer-events:none;animation:drift 12s ease-in-out infinite alternate}
.orb-1{background:var(--accent-1);top:-100px;left:-100px}
.orb-2{background:#00b4d8;bottom:-100px;right:-100px;animation-delay:-6s}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(40px,30px)}}
.login-box{background:var(--bg-card);border:1px solid rgba(30,38,64,0.5);border-radius:16px;padding:44px 40px 36px;width:100%;max-width:400px;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,0.6);position:relative;z-index:1}
.login-box::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(135deg,rgba(255,59,74,0.15),transparent 50%,rgba(0,180,216,0.1));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.login-logo{width:52px;height:52px;background:var(--accent-gradient);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:22px;box-shadow:0 4px 16px rgba(255,59,74,0.3);position:relative;overflow:hidden}
.login-logo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent 60%)}
.login-box h1{font-size:21px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.login-box p{color:var(--text-secondary);font-size:13px;margin-bottom:26px}
.login-error{color:var(--red);font-size:12px;margin-bottom:14px;display:none;padding:10px 14px;background:rgba(239,68,68,0.08);border-radius:8px;border:1px solid rgba(239,68,68,0.15)}
.login-box .input{width:100%;padding:11px 16px;background:var(--bg-input);border:1px solid var(--border-color);border-radius:10px;color:var(--text-primary);font-size:14px;outline:none;transition:all .2s;font-family:inherit;box-sizing:border-box}
.login-box .input:focus{border-color:var(--accent-1);box-shadow:0 0 0 3px rgba(255,59,74,0.12)}
.login-box .input::placeholder{color:#4a5478}
.login-box .btn{width:100%;padding:11px;background:var(--accent-gradient);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;transition:all .25s;box-shadow:0 4px 16px rgba(255,59,74,0.25);display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.login-box .btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,59,74,0.35)}
.login-box .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:1px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border-color)}
.btn-discord{background:#5865f2!important;box-shadow:0 4px 16px rgba(88,101,242,0.25)!important}
.btn-discord:hover{box-shadow:0 6px 24px rgba(88,101,242,0.35)!important}
.spinner{display:none}
.btn.loading .spinner{display:inline}
.btn.loading .label{display:none}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="login-box">
    <div class="login-logo"><i class="fas fa-gamepad"></i></div>
    <h1>Command Center</h1>
    <p>Masukkan password untuk mengakses dashboard</p>
    <div class="login-error" id="loginError">{{ discord_error or '' }}</div>
    <form id="loginForm" autocomplete="off">
        <input type="password" class="input" id="passwordInput" placeholder="Password" autofocus>
        <button type="submit" class="btn" id="loginBtn">
            <span class="label"><i class="fas fa-lock"></i> Masuk ke Dashboard</span>
            <span class="spinner"><i class="fas fa-spinner fa-spin"></i> Memverifikasi...</span>
        </button>
    </form>
    <div class="login-divider">atau</div>
    <button class="btn btn-discord" id="discordLoginBtn" onclick="loginWithDiscord()">
        <i class="fab fa-discord"></i> Login dengan Discord
    </button>
</div>
<script>
{% if discord_error %}
document.getElementById('loginError').style.display = 'block';
{% endif %}
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    const pwd = document.getElementById('passwordInput').value.trim();
    if (!pwd) { err.textContent = 'Masukkan password'; err.style.display = 'block'; return; }
    btn.classList.add('loading');
    btn.disabled = true;
    err.style.display = 'none';
    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({password: pwd})
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/';
        } else {
            err.textContent = data.error || 'Password salah';
            err.style.display = 'block';
        }
    } catch(e) {
        err.textContent = 'Network error';
        err.style.display = 'block';
    }
    btn.classList.remove('loading');
    btn.disabled = false;
});
document.getElementById('passwordInput').addEventListener('keydown', () => {
    document.getElementById('loginError').style.display = 'none';
});
async function loginWithDiscord() {
    const btn = document.getElementById('discordLoginBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengarahkan ke Discord...';
    try {
        const res = await fetch('/api/auth/discord');
        const data = await res.json();
        if (data.redirect) {
            window.location.href = data.redirect;
        } else {
            document.getElementById('loginError').textContent = data.error || 'Gagal';
            document.getElementById('loginError').style.display = 'block';
            btn.innerHTML = '<i class="fab fa-discord"></i> Login dengan Discord';
            btn.disabled = false;
        }
    } catch(e) {
        document.getElementById('loginError').textContent = 'Network error';
        document.getElementById('loginError').style.display = 'block';
        btn.innerHTML = '<i class="fab fa-discord"></i> Login dengan Discord';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
