<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Dashboard Roblox — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-primary:#0a0b1a;--bg-card:#12142a;--bg-input:#1a1c3b;--border-color:#25284a;--text-primary:#e8e9f3;--text-secondary:#8b8da8;--accent-1:#667eea;--accent-2:#764ba2;--accent-gradient:linear-gradient(135deg,#667eea,#764ba2);--green:#43e97b;--red:#f5576c}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(102,126,234,0.06) 0%,transparent 100%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(118,75,162,0.06) 0%,transparent 100%),var(--bg-primary)}
.login-box{background:var(--bg-card);border:1px solid rgba(37,40,74,0.5);border-radius:16px;padding:48px 40px 40px;width:100%;max-width:400px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.4);position:relative;backdrop-filter:blur(20px)}
.login-box::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(135deg,rgba(102,126,234,0.2),transparent 50%,rgba(118,75,162,0.2));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.login-box h1{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
.login-box p{color:var(--text-secondary);font-size:13px;margin-bottom:28px}
.login-box .error{color:var(--red);font-size:13px;margin-bottom:16px;display:none;padding:10px;background:rgba(245,87,108,0.1);border-radius:8px;border:1px solid rgba(245,87,108,0.2)}
.login-box input{width:100%;padding:12px 16px;background:var(--bg-input);border:1px solid var(--border-color);border-radius:10px;color:var(--text-primary);font-size:15px;outline:none;transition:border .2s,box-shadow .2s}
.login-box input:focus{border-color:var(--accent-1);box-shadow:0 0 0 3px rgba(102,126,234,0.15)}
.login-box input::placeholder{color:var(--text-muted)}
.login-box button{width:100%;padding:12px;background:var(--accent-gradient);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 15px rgba(102,126,234,0.3)}
.login-box button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,0.4)}
.login-box button:disabled{opacity:.6;cursor:not-allowed;transform:none}
.logo{width:56px;height:56px;background:var(--accent-gradient);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;box-shadow:0 4px 12px rgba(102,126,234,0.3)}
.spinner{display:none}
button.loading .spinner{display:inline}
button.loading .label{display:none}
</style>
</head>
<body>
<div class="login-box">
    <div class="logo"><i class="fas fa-gamepad"></i></div>
    <h1>Dashboard Roblox</h1>
    <p>Masukkan password untuk melanjutkan</p>
    <div class="error" id="loginError"></div>
    <form id="loginForm" autocomplete="off">
        <input type="password" id="passwordInput" placeholder="Password" autofocus>
        <button type="submit" id="loginBtn">
            <span class="label">Masuk</span>
            <span class="spinner"><i class="fas fa-spinner fa-spin"></i> Memproses...</span>
        </button>
    </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    const pwd = document.getElementById('passwordInput').value.trim();
    if (!pwd) { err.textContent = 'Masukkan password'; err.style.display = 'block'; return; }
    btn.classList.add('loading');
    btn.disabled = true;
    err.style.display = 'none';
    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({password: pwd})
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/';
        } else {
            err.textContent = data.error || 'Password salah';
            err.style.display = 'block';
        }
    } catch(e) {
        err.textContent = 'Network error';
        err.style.display = 'block';
    }
    btn.classList.remove('loading');
    btn.disabled = false;
});
document.getElementById('passwordInput').addEventListener('keydown', (e) => {
    document.getElementById('loginError').style.display = 'none';
});
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>
</html>
